version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: recon_postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_secure_pass}
      POSTGRES_DB: ${POSTGRES_DB:-recon_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-recon_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: recon_fastapi_backend
    restart: always
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - PROJECT_NAME=${PROJECT_NAME:-Automated Reconciliation Engine}
      - API_V1_STR=${API_V1_STR:-/api/v1}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-949f1db8dfde7b864a7cd254c6001d9f828a2a8b94154425712adcd5b36440c9}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-11520}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres_secure_pass}
      - POSTGRES_DB=${POSTGRES_DB:-recon_db}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - BACKEND_CORS_ORIGINS=${BACKEND_CORS_ORIGINS:-http://localhost:8501,http://127.0.0.1:8501}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/workspace

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: recon_streamlit_frontend
    restart: always
    environment:
      - BACKEND_API_URL=${BACKEND_API_URL:-http://backend:8000/api/v1}
    ports:
      - "8501:8501"
    depends_on:
      - backend
    volumes:
      - ./frontend:/workspace

volumes:
  postgres_data:
